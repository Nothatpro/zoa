<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Paris By Emily — Immersive Emily in Paris experiences. Walking tours, croissant workshops, macaron classes, and champagne Seine cruises in Paris and Rome.">
  <title>Paris By Emily — Where Will Your Story Begin?</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="landing-page" id="landing-page">
    <!-- Background Text -->
    <div class="landing-bg-text" id="landing-bg-text">
      Where will your Emily story begin?
    </div>

    <!-- City Cards -->
    <div class="landing-cards" id="landing-cards">
      <!-- Paris Card -->
      <a href="paris.html" class="landing-card" id="paris-card" style="opacity:0; transform: rotate(-4deg) translateY(60px);">
        <img
          class="landing-card-bg"
          src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&q=80"
          alt="Paris city skyline"
          loading="eager"
        >
        <div class="landing-card-overlay"></div>
        <div class="landing-card-content">
          <h2 class="landing-card-title">Paris</h2>
        </div>
        <span class="landing-card-label">Paris By Emily</span>
      </a>

      <!-- Rome Card -->
      <a href="#" class="landing-card" id="rome-card" style="opacity:0; transform: rotate(4deg) translateY(60px);">
        <img
          class="landing-card-bg"
          src="https://images.unsplash.com/photo-1515542622106-78bda8ba0e5b?w=800&q=80"
          alt="Rome architecture"
          loading="eager"
        >
        <div class="landing-card-overlay"></div>
        <div class="landing-card-content">
          <h2 class="landing-card-title">Rome</h2>
        </div>
        <span class="landing-card-label">Rome By Emily</span>
      </a>
    </div>
  </main>

  <!-- Cookie Banner -->
  <div class="cookie-banner" id="cookie-banner">
    <span class="cookie-text">We use cookies to enhance your experience on our site.</span>
    <div class="cookie-btns">
      <button class="cookie-btn cookie-btn--decline" id="cookie-decline">Decline</button>
      <button class="cookie-btn cookie-btn--accept" id="cookie-accept">Accept</button>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
